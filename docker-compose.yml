services:
  softwer.dev-client:
    build:
      context: ./ui
      dockerfile: dockerfile
    ports:
      - "3400:80"
    depends_on:
      - softwer.dev-server

  softwer.dev-server:
    build:
      context: ./ui/server
      dockerfile: dockerfile
    ports:
      - "3450:3001"
    env_file:
      - ./.env
    networks:
      default:
        aliases:
          - api
